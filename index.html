    .card.low { border-left-color: #43a047; }

    .badge-channel.dir { background: #fce8e6; color: #c62828; }

    .badge-priority.medium { background: #fff3e0; color: #fb8c00; }
    .badge-priority.low { background: #e8f5e9; color: #43a047; }

let currentChannel = 'all';
let currentKeyword = '';

function tagClick(el, keyword) {
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = keyword;
  currentKeyword = keyword;
  doSearch();
}

function onInput() {
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  currentKeyword = document.getElementById('searchInput').value;
}

function setChannel(ch, btn) {
  currentChannel = ch;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentKeyword) doSearch();
}

function doSearch() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  currentKeyword = kw;
  if (!kw) { document.getElementById('results').innerHTML = ''; document.getElementById('resultCount').textContent = ''; return; }

  let matched = DB_INLINE.filter(s => {
    const hit = s.products.some(p => p.toLowerCase().includes(kw)) ||
                s.screenName.toLowerCase().includes(kw) ||
                s.screenId.toLowerCase().includes(kw) ||
                (s.exposureLocations || []).some(l => l.toLowerCase().includes(kw));
    const chOk = currentChannel === 'all' || s.channel === currentChannel;
    return hit && chOk;
  });

  // HIGH 먼저 정렬
  matched.sort((a, b) => {
    const pa = HIGH_SCREENS.has(a.screenId) ? 0 : 1;
    const pb = HIGH_SCREENS.has(b.screenId) ? 0 : 1;
    return pa - pb;
  });

  const total = matched.length;
  const highCnt = matched.filter(s => HIGH_SCREENS.has(s.screenId)).length;
  document.getElementById('resultCount').innerHTML =
    `<strong>${total}개</strong> 화면에서 노출 중 — <span style="color:#e53935">🔴 HIGH ${highCnt}개</span> 즉시 수정 필요`;

  if (total === 0) {
    document.getElementById('results').innerHTML = '<div class="empty">검색 결과가 없습니다</div>';
    return;
  }

  document.getElementById('results').innerHTML = matched.map(s => {
    const isHigh = HIGH_SCREENS.has(s.screenId);
    const priority = isHigh ? 'high' : 'medium';
    const priorityLabel = isHigh ? 'HIGH' : 'MEDIUM';
    const chBadge = s.channel === '다이렉트' ? 'dir' : 'rep';
    const chLabel = s.channel === '다이렉트' ? '다이렉트' : '대표홈';
    const figmaLink = s.figmaNodeId
      ? `<a href="https://www.figma.com/board/Qo2n8H7LkzcOEcDLGjQl5P/?node-id=${s.figmaNodeId}" target="_blank" style="font-size:11px;color:#888;margin-left:8px;">🎨 FigJam</a>`
      : '';

    const matchedProducts = s.products.filter(p => p.toLowerCase().includes(kw));
    const chips = matchedProducts.map(p =>
      `<span class="product-chip matched">${p}</span>`
    ).join('');

    return `
    <div class="card ${priority}">
      <div class="card-header">
        <span class="badge-channel ${chBadge}">${chLabel}</span>
        <span class="badge-priority ${priority}">${priorityLabel}</span>
        <span class="screen-id">${s.screenId}</span>
        ${figmaLink}
      </div>
      <div class="screen-name">${s.screenName}</div>
      <div class="card-body">
        <div class="locations">📍 노출 위치: ${(s.exposureLocations||[]).join(' · ')}</div>
        ${chips ? `<div class="products-list">${chips}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
